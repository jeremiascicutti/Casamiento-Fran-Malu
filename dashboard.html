<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Prana · Dic 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --glass: rgba(255,255,255,0.07);
      --glass-hover: rgba(255,255,255,0.11);
      --glass-strong: rgba(255,255,255,0.15);
      --glass-modal: rgba(16,16,24,0.95);
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #ffffff;
      --text2: rgba(255,255,255,0.55);
      --text3: rgba(255,255,255,0.3);
      --accent: #0a84ff;
      --accent-soft: rgba(10,132,255,0.18);
      --wedding: #bf5af2;
      --wedding-soft: rgba(191,90,242,0.15);
      --wedding-zone: #64d2ff;
      --wedding-zone-soft: rgba(100,210,255,0.12);
      --xmas: #30d158;
      --xmas-soft: rgba(48,209,88,0.15);
      --xmas-zone: #40c8e0;
      --xmas-zone-soft: rgba(64,200,224,0.12);
      --green: #30d158;
      --green-soft: rgba(48,209,88,0.15);
      --orange: #ff9f0a;
      --orange-soft: rgba(255,159,10,0.15);
      --red: #ff453a;
      --red-soft: rgba(255,69,58,0.15);
      --shadow-sm: 0 4px 24px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 40px rgba(0,0,0,0.6);
      --shadow-lg: 0 24px 80px rgba(0,0,0,0.8);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --blur: blur(24px) saturate(180%);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .bg-blur {
      position: fixed; inset: -60px; z-index: -2;
      background-size: cover; background-position: center;
      filter: blur(60px) brightness(0.22) saturate(1.6);
      transform: scale(1.15);
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse at 50% 0%, rgba(30,20,60,0.3) 0%, rgba(10,10,15,0.75) 70%);
    }

    .hero { position: relative; height: 380px; overflow: hidden; }
    .hero-photos {
      display: grid; grid-template-columns: 1.6fr 1fr;
      grid-template-rows: 1fr 1fr; gap: 2px; height: 100%;
    }
    .hero-photo { overflow: hidden; background: #111120; }
    .hero-photo:first-child { grid-row: span 2; }
    .hero-photo img { width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.8s ease; }
    .hero-photo:hover img { transform: scale(1.04); }
    .hero-overlay {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom, rgba(10,10,15,0.05) 0%, rgba(10,10,15,0.2) 40%, rgba(10,10,15,0.7) 75%, var(--bg) 100%);
    }
    .hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 36px 32px 28px; pointer-events: none; }
    .hero-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
    .hero-title { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: #fff; margin-bottom: 14px; }
    .hero-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      padding: 5px 14px; font-size: 12px; font-weight: 600; color: #fff;
    }

    .sticky-nav {
      background: rgba(255,255,255,0.07);
      backdrop-filter: saturate(200%) blur(24px); -webkit-backdrop-filter: saturate(200%) blur(24px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 0 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      transform: translateY(-4px);
    }
    .sticky-nav.visible {
      opacity: 1; pointer-events: auto; transform: translateY(0);
    }
    .sticky-nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; gap: 12px; }
    .nav-name { font-size: 15px; font-weight: 700; color: #fff; }
    .nav-sub { font-size: 12px; color: var(--text2); }
    .nav-badges { display: flex; gap: 6px; }
    .nav-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge-w { background: var(--wedding-soft); color: var(--wedding); }
    .badge-x { background: var(--xmas-soft); color: var(--xmas); }

    .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

    .links-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .link-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.18s; border: 1px solid transparent; }
    .link-btn.clickable { background: var(--glass); border-color: var(--border); color: var(--accent); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); }
    .link-btn.clickable:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateY(-1px); }
    .link-btn.static-info { background: var(--glass); border-color: var(--border); color: var(--text2); cursor: default; pointer-events: none; }
    .link-arrow { font-size: 10px; opacity: 0.5; margin-left: 2px; }

    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; color: #fff; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; color: #fff; }

    .calendar-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 20px; }
    .night-card {
      background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius); padding: 14px; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1); position: relative; overflow: hidden;
    }
    .night-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.12); transition: background 0.2s; }
    .night-card.wedding::before { background: var(--wedding); }
    .night-card.xmas::before { background: var(--xmas); }
    .night-card.wedding-zone::before { background: var(--wedding-zone); }
    .night-card.xmas-zone::before { background: var(--xmas-zone); }
    .night-card.checkout { opacity: 0.45; cursor: default; }
    .night-card.checkout:hover { transform: none !important; }
    .night-card:hover:not(.checkout) { background: var(--glass-hover); transform: translateY(-3px); border-color: var(--border2); }
    .night-card.selected { background: var(--glass-strong); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .night-card.wedding.selected { border-color: var(--wedding); box-shadow: 0 0 0 2px var(--wedding-soft); }
    .night-card.xmas.selected { border-color: var(--xmas); box-shadow: 0 0 0 2px var(--xmas-soft); }
    .night-event-tag { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; margin-bottom: 6px; }
    .night-event-tag.wedding { background: var(--wedding-soft); color: var(--wedding); }
    .night-event-tag.xmas { background: var(--xmas-soft); color: var(--xmas); }
    .night-event-tag.wedding-zone { background: var(--wedding-zone-soft); color: var(--wedding-zone); }
    .night-event-tag.xmas-zone { background: var(--xmas-zone-soft); color: var(--xmas-zone); }
    .night-date { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; line-height: 1; color: #fff; }
    .night-month { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 10px; }
    .night-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-bottom: 7px; overflow: hidden; }
    .night-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .night-bar-fill.default { background: var(--accent); }
    .night-bar-fill.wedding { background: var(--wedding); }
    .night-bar-fill.xmas { background: var(--xmas); }
    .night-bar-fill.wedding-zone { background: var(--wedding-zone); }
    .night-bar-fill.xmas-zone { background: var(--xmas-zone); }
    .night-count { font-size: 12px; color: var(--text2); font-weight: 500; }
    .night-count strong { color: #fff; font-weight: 700; }
    .night-cost-per { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .detail-panel {
      background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; display: none;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
    .detail-panel.open { display: block; }
    .detail-header { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .detail-title { font-size: 15px; font-weight: 700; color: #fff; }
    .close-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text2); transition: background 0.15s; }
    .close-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .detail-body { padding: 16px 22px; }
    .detail-section-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

    .room-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 6px; overflow: hidden; background: rgba(255,255,255,0.04); }
    .room-emoji { font-size: 16px; }
    .room-item-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
    .room-item-cap { font-size: 11px; color: var(--text3); margin-left: auto; }
    .room-type-btn { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid; cursor: pointer; font-family: var(--font); transition: all 0.15s; white-space: nowrap; }
    .room-type-btn.flex { background: rgba(255,255,255,0.08); color: var(--text2); border-color: var(--border); }
    .room-type-btn.flex:hover { border-color: var(--wedding); color: var(--wedding); }
    .room-type-btn.pareja { background: var(--wedding-soft); color: var(--wedding); border-color: var(--wedding); }
    .room-type-btn.pareja:hover { opacity: 0.75; }
    .room-cap-badge { font-size: 11px; font-weight: 700; min-width: 28px; text-align: right; color: var(--text3); }
    .room-cap-badge.over { color: var(--red); }

    .guest-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.14); border-radius: 20px; font-size: 11px; font-weight: 500; color: #fff; white-space: nowrap; padding: 3px 9px; }
    .chip-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; color: #fff; }

    .card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 700; color: #fff; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 18px; background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    td { padding: 13px 18px; font-size: 13px; vertical-align: middle; color: #fff; }
    .guest-name-wrap { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
    .avatar-name { font-weight: 600; font-size: 14px; color: #fff; }
    .avatar-room { font-size: 11px; color: var(--text2); }
    .nights-track { display: flex; gap: 2px; align-items: center; }
    .ndot { width: 9px; height: 9px; border-radius: 50%; }
    .ndot.on { background: var(--accent); }
    .ndot.on.w { background: var(--wedding); }
    .ndot.on.x { background: var(--xmas); }
    .ndot.off { background: rgba(255,255,255,0.1); }
    .tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .tag-sleep { background: var(--accent-soft); color: var(--accent); }
    .tag-ext { background: var(--orange-soft); color: var(--orange); }
    .paid-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: all 0.18s; background: none; font-family: var(--font); }
    .paid-toggle.paid { background: var(--green-soft); color: var(--green); border-color: var(--green); }
    .paid-toggle.unpaid { background: var(--red-soft); color: var(--red); border-color: var(--red); }
    .paid-toggle:hover { opacity: 0.75; }
    .action-btns { display: flex; gap: 6px; align-items: center; }
    .action-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: rgba(255,255,255,0.06); cursor: pointer; font-size: 14px; transition: all 0.15s; }
    .action-btn:hover.edit { background: var(--accent-soft); border-color: var(--accent); }
    .action-btn:hover.del { background: var(--red-soft); border-color: var(--red); }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
    .empty-icon { font-size: 38px; margin-bottom: 10px; }
    .empty-text { font-size: 14px; }

    .cost-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .cost-body { padding: 4px 0; }
    .cost-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .cost-row:last-child { border-bottom: none; }
    .cost-person { display: flex; align-items: center; gap: 10px; }
    .cost-name { font-size: 13px; font-weight: 600; color: #fff; }
    .cost-detail { font-size: 11px; color: var(--text2); }
    .cost-amount { font-size: 15px; font-weight: 700; color: #fff; }
    .cost-status-paid { color: var(--green); font-size: 12px; font-weight: 700; }
    .cost-status-unpaid { color: var(--red); font-size: 12px; font-weight: 700; }
    .cost-total-row { background: rgba(255,255,255,0.06); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
    .cost-total-label { font-size: 14px; font-weight: 700; color: #fff; }
    .cost-total-amount { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .cost-progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin: 0 20px 16px; }
    .cost-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s ease; }

    .btn-primary { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity 0.15s, transform 0.1s; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--glass-modal); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border-radius: 22px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; overflow: hidden; animation: modalIn 0.28s cubic-bezier(0.34,1.4,0.64,1); }
    @keyframes modalIn { from { transform:scale(0.9) translateY(16px); opacity:0; } to { transform:none; opacity:1; } }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 18px; font-weight: 700; color: #fff; }
    .modal-body { padding: 20px 24px; max-height: 70vh; overflow-y: auto; }
    .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .field input, .field select { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: var(--font); color: #fff; background: rgba(255,255,255,0.08); outline: none; transition: all 0.15s; }
    .field input::placeholder { color: var(--text3); }
    .field select option { background: #1a1a2e; color: #fff; }
    .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: rgba(255,255,255,0.12); }
    .nights-picker { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
    .night-toggle { border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 9px 4px; text-align: center; cursor: pointer; transition: all 0.15s; background: rgba(255,255,255,0.06); user-select: none; color: var(--text2); }
    .night-toggle:hover { border-color: var(--accent); color: #fff; }
    .night-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .night-toggle.active.w { background: var(--wedding); border-color: var(--wedding); }
    .night-toggle.active.x { background: var(--xmas); border-color: var(--xmas); }
    .night-toggle-date { font-size: 16px; font-weight: 800; }
    .night-toggle-day { font-size: 10px; opacity: 0.7; }
    .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); color: #fff; transition: background 0.15s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.18); }
    .btn-danger { background: var(--red-soft); border: 1px solid var(--red); border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); color: var(--red); transition: all 0.15s; margin-right: auto; }
    .btn-danger:hover { background: var(--red); color: #fff; }

    .av0 { background: linear-gradient(135deg,#667eea,#764ba2); }
    .av1 { background: linear-gradient(135deg,#f093fb,#f5576c); }
    .av2 { background: linear-gradient(135deg,#4facfe,#00f2fe); }
    .av3 { background: linear-gradient(135deg,#43e97b,#38f9d7); }
    .av4 { background: linear-gradient(135deg,#fa709a,#fee140); }
    .av5 { background: linear-gradient(135deg,#a18cd1,#fbc2eb); }
    .av6 { background: linear-gradient(135deg,#fccb90,#d57eeb); }
    .av7 { background: linear-gradient(135deg,#a1c4fd,#c2e9fb); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .calendar-grid { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 640px) {
      .hero { height: 280px; }
      .hero-title { font-size: 30px; }
      .nav-badges { display: none; }
      .stats-row { grid-template-columns: repeat(2,1fr); gap: 8px; }
      .stat-card { padding: 14px 16px; }
      .stat-value { font-size: 22px; }
      .calendar-grid { grid-template-columns: repeat(3,1fr); gap: 6px; }
      .night-card { padding: 10px; }
      .night-date { font-size: 20px; }
      .main { padding: 16px 14px 80px; }
      table { font-size: 12px; }
      thead th, td { padding: 10px 12px; }
    }
    @media (max-width: 420px) {
      .calendar-grid { grid-template-columns: repeat(2,1fr); }
      .nights-picker { grid-template-columns: repeat(3,1fr); }
      .hero-photos { grid-template-columns: 1fr; }
      .hero-photo:not(:first-child) { display: none; }
    }

    @supports not (backdrop-filter: blur(1px)) {
      .stat-card, .card, .night-card, .detail-panel, .cost-card,
      .link-btn.clickable, .link-btn.static-info, .sticky-nav, .room-item {
        background: rgba(28,28,40,0.92) !important;
      }
      .modal { background: rgba(16,16,28,0.98) !important; }
    }

    @media (max-width: 768px) {
      .bg-blur, .bg-overlay { display: none !important; }
      .room-item { flex-wrap: wrap; overflow: visible; }
      .room-item-name { flex: 1; min-width: 0; }
      .room-item > div:last-child { flex-shrink: 0; }
      .room-item > div:nth-child(3) { width: 100%; order: 4; margin-top: 6px; flex-wrap: wrap; overflow: visible; }
      body { background: #0e0e16; }
      .stat-card, .card, .night-card, .detail-panel, .cost-card, .sticky-nav {
        background: rgba(255,255,255,0.09) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-color: rgba(255,255,255,0.12) !important;
      }
      .room-item { background: rgba(255,255,255,0.06) !important; backdrop-filter: none !important; }
      .link-btn { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
      .modal { background: #1a1a2a !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
// DATA — fuente de verdad. Editar acá o desde la UI.
// ══════════════════════════════════════════════════════
const DATA = {
  casa: {
    nombre: "Casa Prana",
    costo_por_noche: 750,
    moneda: "USD"
  },
  habitaciones: [
    { id:"h1", nombre:"Hab 1" },
    { id:"h2", nombre:"Hab 2" },
    { id:"h3", nombre:"Hab 3" },
    { id:"h4", nombre:"Hab 4" },
    { id:"h5", nombre:"Hab 5" },
    { id:"h6", nombre:"Hab 6" }
  ],
  noches: [
    { id:"n1",  label:"17", dia:"Jue", evento:"wedding-zone" },
    { id:"n2",  label:"18", dia:"Vie", evento:"wedding-zone" },
    { id:"n3",  label:"19", dia:"Sáb", evento:"wedding" },
    { id:"n4",  label:"20", dia:"Dom", evento:"wedding-zone" },
    { id:"n5",  label:"21", dia:"Lun", evento:"wedding-zone" },
    { id:"n6",  label:"22", dia:"Mar", evento:"xmas-zone" },
    { id:"n7",  label:"23", dia:"Mié", evento:"xmas-zone" },
    { id:"n8",  label:"24", dia:"Jue", evento:"xmas" },
    { id:"n9",  label:"25", dia:"Vie", evento:"xmas-zone" },
    { id:"n10", label:"26", dia:"Sáb", evento:"xmas-zone", checkout:true }
  ],
  huespedes: [
    { id:"g1", nombre:"Jere Cicutti",    tipo:"sleeping", habitacion:"h1", noches:["n1","n2","n3","n4","n5","n6","n7","n8","n9"], pagado:false },
    { id:"g2", nombre:"Cocho Velasco",   tipo:"sleeping", habitacion:"h2", noches:["n1","n2","n3","n4","n5","n6","n7","n8","n9"], pagado:false },
    { id:"g3", nombre:"Cami Malerba",    tipo:"sleeping", habitacion:"h2", noches:["n1","n2","n3","n4","n5","n6","n7","n8","n9"], pagado:false },
    { id:"g4", nombre:"Ivo Chiapponi",   tipo:"sleeping", habitacion:"h1", noches:["n1","n2","n3","n4"], pagado:false },
    { id:"g5", nombre:"Mati Pilleta",    tipo:"sleeping", habitacion:"h1", noches:["n1","n2","n3","n4"], pagado:false },
    { id:"g6", nombre:"Mati Santamans",  tipo:"sleeping", habitacion:"h3", noches:["n1","n2","n3","n4"], pagado:false },
    { id:"g7", nombre:"Nicky Insua",     tipo:"sleeping", habitacion:"h3", noches:["n1","n2","n3","n4"], pagado:false },
    { id:"g8", nombre:"Fran Gutierrez",  tipo:"sleeping", habitacion:"h3", noches:["n7","n8","n9"], pagado:false },
    { id:"g9", nombre:"Malu Varano",     tipo:"sleeping", habitacion:"h3", noches:["n7","n8","n9"], pagado:false }
  ],
  roomConfig: {
    "n1_h2":"pareja","n2_h2":"pareja","n3_h2":"pareja","n4_h2":"pareja","n5_h2":"pareja","n6_h2":"pareja","n7_h2":"pareja","n8_h2":"pareja","n9_h2":"pareja",
    "n1_h3":"pareja","n2_h3":"pareja","n3_h3":"pareja","n4_h3":"pareja",
    "n7_h3":"pareja","n8_h3":"pareja","n9_h3":"pareja"
  }
};
// ══════════════════════════════════════════════════════

let selectedNight = null;
let editingId = null;

// ─── INIT ─────────────────────────────────────────────
function init() {
  selectedNight = "n1";
  const bgEl = document.getElementById("bgBlur");
  const img1 = document.getElementById("heroImg1");
  if (bgEl && img1 && window.innerWidth >= 768) bgEl.style.backgroundImage = "url(" + img1.src + ")";
  renderStats();
  renderCalendar();
  renderGuestTable();
  renderCostSummary();
  buildModalNightsPicker();
  buildModalRoomSelect();
  renderDetailPanel("n1");
  document.getElementById("detailPanel").classList.add("open");

  const nav = document.querySelector(".sticky-nav");
  const hero = document.querySelector(".hero");
  const observer = new IntersectionObserver(
    ([entry]) => nav.classList.toggle("visible", !entry.isIntersecting),
    { threshold: 0.1 }
  );
  observer.observe(hero);
}

// ─── STATS ────────────────────────────────────────────
function renderStats() {
  const sleeping = DATA.huespedes.filter(g => g.tipo === "sleeping");
  const external = DATA.huespedes.filter(g => g.tipo === "external");
  const nochesReales = DATA.noches.filter(n => !n.checkout).length;
  const totalCasa = DATA.casa.costo_por_noche * nochesReales;
  const pagado = sleeping.reduce((s,g) => s + (g.pagado ? calcGuestCost(g) : 0), 0);

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Huéspedes</div>
      <div class="stat-value">${sleeping.length}</div>
      <div class="stat-sub">de 18 cap. máx.</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total casa</div>
      <div class="stat-value">USD ${totalCasa.toLocaleString()}</div>
      <div class="stat-sub">${nochesReales} noches × USD ${DATA.casa.costo_por_noche}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Recaudado</div>
      <div class="stat-value" style="color:var(--green)">USD ${pagado}</div>
      <div class="stat-sub">de USD ${totalCasa}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ext. Nochebuena</div>
      <div class="stat-value">${external.length}</div>
      <div class="stat-sub">invitados sin alojamiento</div>
    </div>
  `;
}

// ─── CALENDAR ─────────────────────────────────────────
function renderCalendar() {
  const MAX_CAP = DATA.habitaciones.length * 3;
  const evLabels = {
    "wedding": "💍 Casamiento",
    "wedding-zone": "Casamiento",
    "xmas": "🎄 Nochebuena",
    "xmas-zone": "Navidad"
  };
  document.getElementById("calendarGrid").innerHTML = DATA.noches.map(n => {
    const isCheckout = !!n.checkout;
    const guests = isCheckout ? [] : guestsInNight(n.id);
    const pct = Math.min(100, Math.round((guests.length / MAX_CAP) * 100));
    const ev = n.evento || "";
    const evLabel = evLabels[ev] || "";
    const cpp = guests.length > 0 ? Math.round(DATA.casa.costo_por_noche / guests.length) : 0;
    const sel = selectedNight === n.id ? "selected" : "";
    const clickHandler = isCheckout ? "" : `onclick="toggleNight('${n.id}')"`;
    const checkoutClass = isCheckout ? "checkout" : "";
    return `
      <div class="night-card ${ev} ${sel} ${checkoutClass}" ${clickHandler}>
        ${ev ? `<div class="night-event-tag ${ev}">${evLabel}</div>` : ""}
        <div class="night-date">${n.label}</div>
        <div class="night-month">${n.dia} dic</div>
        ${isCheckout
          ? `<div style="margin-top:8px;font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Check-out</div>`
          : `<div class="night-bar"><div class="night-bar-fill ${ev||"default"}" style="width:${pct}%"></div></div>
             <div class="night-count"><strong>${guests.length}</strong> persona${guests.length!==1?"s":""}</div>
             <div class="night-cost-per">${cpp > 0 ? `~USD ${cpp}/pers.` : "—"}</div>`
        }
      </div>`;
  }).join("");
}

function toggleNight(id) {
  if (selectedNight === id) { closeDetail(); return; }
  selectedNight = id;
  renderCalendar();
  renderDetailPanel(id);
  document.getElementById("detailPanel").classList.add("open");
  document.getElementById("detailPanel").scrollIntoView({ behavior:"smooth", block:"nearest" });
}

function closeDetail() {
  selectedNight = null;
  document.getElementById("detailPanel").classList.remove("open");
  renderCalendar();
}

// ─── DETAIL PANEL ─────────────────────────────────────
function renderDetailPanel(nightId) {
  const n = DATA.noches.find(x => x.id === nightId);
  const guests = guestsInNight(nightId);
  const evLabels2 = { "wedding":" · 💍 Casamiento", "wedding-zone":" · Casamiento", "xmas":" · 🎄 Nochebuena", "xmas-zone":" · Navidad" };
  const evLabel = evLabels2[n.evento] || "";
  document.getElementById("detailTitle").textContent = `Noche ${n.label}/${parseInt(n.label)+1} dic${evLabel}`;

  document.getElementById("detailRooms").innerHTML = DATA.habitaciones.map(h => {
    const hg = guests.filter(g => g.habitacion === h.id);
    const type = getRoomType(nightId, h.id);
    const cap = type === "pareja" ? 2 : 3;
    const over = hg.length > cap;
    const label = type === "pareja" ? "👫 Pareja" : "🛌 Flexible";
    return `
      <div class="room-item">
        <span class="room-emoji">🛏</span>
        <div class="room-item-name" style="white-space:nowrap">${h.nombre}</div>
        <div style="display:flex;gap:4px;align-items:center;flex:1;min-width:0;overflow:hidden">
          ${hg.length
            ? hg.map((g,i) => `<div class="guest-chip" style="padding:3px 9px;font-size:11px;white-space:nowrap"><div class="chip-avatar av${i%8}" style="width:18px;height:18px;font-size:8px">${initials(g.nombre)}</div>${g.nombre}</div>`).join("")
            : `<span style="font-size:11px;color:var(--text3);background:var(--bg);border:1px dashed var(--border2);border-radius:20px;padding:3px 10px;white-space:nowrap">Vacía</span>`}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button class="room-type-btn ${type}" onclick="toggleRoomType('${nightId}','${h.id}')" title="Cambiar tipo">${label}</button>
          <span class="room-cap-badge ${over?'over':''}" title="${over?'Excede capacidad':''}">${hg.length}/${cap}${over?' ⚠️':''}</span>
        </div>
      </div>`;
  }).join("");

}

// ─── GUEST TABLE ──────────────────────────────────────
function renderGuestTable() {
  const c = document.getElementById("guestTableContainer");
  if (!DATA.huespedes.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">Todavía no hay huéspedes. Usá "+ Agregar".</div></div>`;
    return;
  }

  const rows = DATA.huespedes.map((g, idx) => {
    const hab = DATA.habitaciones.find(h => h.id === g.habitacion);
    const dots = DATA.noches.filter(n => !n.checkout).map(n => {
      const on = g.noches && g.noches.includes(n.id);
      const cls = on ? (n.evento === "wedding" ? "ndot on w" : n.evento === "xmas" ? "ndot on x" : "ndot on") : "ndot off";
      return `<div class="${cls}" title="${n.label} dic"></div>`;
    }).join("");

    const cost = calcGuestCost(g);
    const paidClass = g.pagado ? "paid" : "unpaid";
    const paidLabel = g.pagado ? "✓ Pagado" : "✗ Pendiente";

    return `
      <tr>
        <td>
          <div class="guest-name-wrap">
            <div class="avatar av${idx%8}">${initials(g.nombre)}</div>
            <div>
              <div class="avatar-name">${g.nombre}</div>
              <div class="avatar-room">${g.tipo==="sleeping" ? (hab?hab.nombre:"—") : "Invitado externo"}</div>
            </div>
          </div>
        </td>
        <td><span class="tag ${g.tipo==="sleeping"?"tag-sleep":"tag-ext"}">${g.tipo==="sleeping"?"Duerme":"Externo"}</span></td>
        <td>
          <div class="nights-track">${dots}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px">${(g.noches||[]).length} noche${(g.noches||[]).length!==1?"s":""}</div>
        </td>
        <td style="font-weight:700;font-size:14px">${g.tipo==="sleeping"?`USD ${cost}`:"—"}</td>
        <td>
          ${g.tipo==="sleeping" ? `<button class="paid-toggle ${paidClass}" onclick="togglePaid('${g.id}')">${paidLabel}</button>` : `<span style="color:var(--text3);font-size:12px">—</span>`}
        </td>
        <td>
          <div class="action-btns">
            <button class="action-btn edit" title="Editar" onclick="openEditModal('${g.id}')">✏️</button>
            <button class="action-btn del" title="Eliminar" onclick="confirmDelete('${g.id}')">🗑</button>
          </div>
        </td>
      </tr>`;
  }).join("");

  c.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Persona</th>
            <th>Tipo</th>
            <th>Noches (17→25 dic)</th>
            <th>A pagar</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ─── COST SUMMARY ─────────────────────────────────────
function renderCostSummary() {
  const sleeping = DATA.huespedes.filter(g => g.tipo === "sleeping");
  const el = document.getElementById("costBody");

  if (!sleeping.length) {
    el.innerHTML = `<div style="padding:32px;text-align:center;color:var(--text3);font-size:14px">Los costos aparecen cuando haya huéspedes cargados.</div>`;
    return;
  }

  const totalCasa = DATA.casa.costo_por_noche * DATA.noches.filter(n=>!n.checkout).length;
  const totalPagado = sleeping.reduce((s,g) => s + (g.pagado ? calcGuestCost(g) : 0), 0);
  const pct = Math.min(100, Math.round((totalPagado/totalCasa)*100));

  const rows = sleeping.map((g,i) => {
    const cost = calcGuestCost(g);
    return `
      <div class="cost-row">
        <div class="cost-person">
          <div class="avatar av${i%8}" style="width:28px;height:28px;font-size:10px">${initials(g.nombre)}</div>
          <div>
            <div class="cost-name">${g.nombre}</div>
            <div class="cost-detail">${(g.noches||[]).length} noche${(g.noches||[]).length!==1?"s":""}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="cost-amount">USD ${cost}</span>
          <span class="cost-status-${g.pagado?"paid":"unpaid"}" style="font-size:12px;font-weight:700">${g.pagado?"✓ Pagó":"⏳ Pendiente"}</span>
        </div>
      </div>`;
  }).join("");

  const diff = totalCasa - sleeping.reduce((s,g)=>s+calcGuestCost(g),0);

  el.innerHTML = `
    <div class="cost-body">${rows}</div>
    <div class="cost-progress-bar">
      <div class="cost-progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="cost-total-row">
      <div>
        <div class="cost-total-label">Recaudado</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${pct}% del total · USD ${totalCasa} costo casa</div>
      </div>
      <div class="cost-total-amount" style="color:var(--green)">USD ${totalPagado}</div>
    </div>
    ${diff > 0 ? `
    <div style="padding:12px 20px;background:var(--red-soft);display:flex;justify-content:space-between;align-items:center;font-size:13px">
      <span style="color:var(--red);font-weight:600">Diferencia sin asignar</span>
      <span style="color:var(--red);font-weight:800">USD ${diff}</span>
    </div>` : ""}`;
}

// ─── MODAL ────────────────────────────────────────────
function buildModalNightsPicker() {
  const evClass = { "wedding":"w", "wedding-zone":"wz", "xmas":"x", "xmas-zone":"xz" };
  document.getElementById("nightsPicker").innerHTML = DATA.noches
    .filter(n => !n.checkout)
    .map(n => `
      <div class="night-toggle ${evClass[n.evento]||""}" data-night="${n.id}" onclick="this.classList.toggle('active')">
        <div class="night-toggle-date">${n.label}</div>
        <div class="night-toggle-day">${n.dia}</div>
      </div>`).join("");
}

function buildModalRoomSelect() {
  document.getElementById("inputRoom").innerHTML = DATA.habitaciones.map(h =>
    `<option value="${h.id}">${h.nombre}</option>`).join("");
}

function updateModalFields() {
  const t = document.getElementById("inputType").value;
  document.getElementById("fieldHab").style.display = t==="sleeping" ? "" : "none";
  document.getElementById("fieldNights").style.display = t==="sleeping" ? "" : "none";
}

function openModal() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "Agregar huésped";
  document.getElementById("btnDelete").style.display = "none";
  document.getElementById("inputName").value = "";
  document.getElementById("inputType").value = "sleeping";
  document.querySelectorAll(".night-toggle").forEach(el => el.classList.remove("active"));
  document.getElementById("inputRoom").selectedIndex = 0;
  updateModalFields();
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(() => document.getElementById("inputName").focus(), 50);
}

function openEditModal(id) {
  const g = DATA.huespedes.find(x => x.id === id);
  if (!g) return;
  editingId = id;
  document.getElementById("modalTitle").textContent = "Editar huésped";
  document.getElementById("btnDelete").style.display = "";
  document.getElementById("inputName").value = g.nombre;
  document.getElementById("inputType").value = g.tipo;
  document.getElementById("inputRoom").value = g.habitacion || "h1";
  document.querySelectorAll(".night-toggle").forEach(el => {
    el.classList.toggle("active", (g.noches||[]).includes(el.dataset.night));
  });
  updateModalFields();
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  editingId = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

function saveGuest() {
  const nombre = document.getElementById("inputName").value.trim();
  if (!nombre) { alert("Ingresá un nombre."); return; }
  const tipo = document.getElementById("inputType").value;
  const habitacion = document.getElementById("inputRoom").value;
  const noches = [...document.querySelectorAll(".night-toggle.active")].map(el => el.dataset.night);

  if (tipo === "sleeping" && !noches.length) { alert("Seleccioná al menos una noche."); return; }

  if (editingId) {
    const g = DATA.huespedes.find(x => x.id === editingId);
    g.nombre = nombre;
    g.tipo = tipo;
    g.habitacion = tipo === "sleeping" ? habitacion : null;
    g.noches = tipo === "sleeping" ? noches : [];
  } else {
    DATA.huespedes.push({
      id: "g" + Date.now(),
      nombre, tipo,
      habitacion: tipo === "sleeping" ? habitacion : null,
      noches: tipo === "sleeping" ? noches : [],
      pagado: false
    });
  }

  closeModal();
  refresh();
}

function deleteEditing() {
  if (!editingId) return;
  if (!confirm("¿Eliminar este huésped?")) return;
  DATA.huespedes = DATA.huespedes.filter(g => g.id !== editingId);
  closeModal();
  refresh();
}

function confirmDelete(id) {
  if (!confirm("¿Eliminar este huésped?")) return;
  DATA.huespedes = DATA.huespedes.filter(g => g.id !== id);
  refresh();
}

function togglePaid(id) {
  const g = DATA.huespedes.find(x => x.id === id);
  if (g) { g.pagado = !g.pagado; refresh(); }
}

function refresh() {
  renderStats();
  renderCalendar();
  renderGuestTable();
  renderCostSummary();
  if (selectedNight) renderDetailPanel(selectedNight);
}

// ─── ROOM CONFIG ──────────────────────────────────────
function getRoomType(nightId, roomId) {
  return DATA.roomConfig[nightId + "_" + roomId] || "flex";
}
function toggleRoomType(nightId, roomId) {
  const key = nightId + "_" + roomId;
  DATA.roomConfig[key] = getRoomType(nightId, roomId) === "pareja" ? "flex" : "pareja";
  renderDetailPanel(nightId);
}

// ─── UTILS ────────────────────────────────────────────
function guestsInNight(nightId) {
  return DATA.huespedes.filter(g => g.tipo==="sleeping" && (g.noches||[]).includes(nightId));
}

function calcGuestCost(g) {
  if (g.tipo !== "sleeping") return 0;
  return Math.round((g.noches||[]).reduce((s, nid) => {
    const count = guestsInNight(nid).length;
    return s + (count > 0 ? DATA.casa.costo_por_noche / count : 0);
  }, 0));
}

function initials(n) {
  return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();
}

init();
</script>
